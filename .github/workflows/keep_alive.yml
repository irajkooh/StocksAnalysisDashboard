name: Keep HF Space Alive

# Two schedules:
#   • every 30 min  — ping the HF Space to prevent sleep
#   • every Monday  — commit a heartbeat file so GitHub never pauses this workflow
#                     (GitHub pauses scheduled workflows after 60 days of repo inactivity)
on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes, all day
    - cron: "0 9 * * 1"      # every Monday at 09:00 UTC
  workflow_dispatch:           # allow manual trigger from GitHub UI

permissions:
  contents: write              # needed for the weekly heartbeat commit

jobs:
  # ── Job 1: ping the HF Space ──────────────────────────────────────────────
  ping:
    name: Ping HF Space
    runs-on: ubuntu-latest
    steps:
      - name: Wake / keep alive
        run: |
          echo "Pinging https://irajkoohi-stocksanalysisdashboard.hf.space ..."
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5 \
            https://irajkoohi-stocksanalysisdashboard.hf.space)
          echo "Response status: $STATUS"

  # ── Job 2: weekly heartbeat commit (keeps repo active → prevents GH pause) ─
  heartbeat:
    name: Weekly heartbeat commit
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 9 * * 1'   # only on the Monday schedule
    steps:
      - uses: actions/checkout@v4

      - name: Write heartbeat timestamp
        run: |
          mkdir -p .github
          echo "Last heartbeat: $(date -u '+%Y-%m-%d %H:%M UTC')" > .github/heartbeat.txt

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/heartbeat.txt
          git commit -m "chore: weekly heartbeat $(date -u '+%Y-%m-%d')"
          git push
